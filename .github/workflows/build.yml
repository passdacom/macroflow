name: Build MacroFlow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --python 3.11

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest tests/ -v

  build-exe:
    name: Build Windows EXE
    needs: lint-test
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --python 3.11

      # pyproject.toml에서 버전을 읽어 EXE 파일명에 반영
      - name: Get version
        id: get_version
        shell: python
        run: |
          import re, os
          text = open("pyproject.toml").read()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          version = m.group(1) if m else "0.0.0"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

      - name: Build EXE
        run: uv run pyinstaller build/macroflow-win.spec

      # 파일명에 버전과 빌드 번호 포함: MacroFlow-v0.2.0-build42.exe
      - name: Rename EXE with version
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          BUILD="${{ github.run_number }}"
          mv dist/MacroFlow.exe "dist/MacroFlow-v${VERSION}-build${BUILD}.exe"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroFlow-exe
          path: dist/MacroFlow-v*.exe
          retention-days: 30

  release:
    name: Create Release
    needs: build-exe
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: MacroFlow-exe
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-exe.outputs.version }}-build${{ github.run_number }}
          name: "MacroFlow v${{ needs.build-exe.outputs.version }} Build ${{ github.run_number }}"
          files: dist/MacroFlow-v*.exe
          generate_release_notes: true
          make_latest: true
